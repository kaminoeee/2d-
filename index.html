<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eeetube</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --accent-color: #ff0000;
            --card-bg: #1f1f1f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }

        h1 {
            color: var(--accent-color);
            margin: 0;
            cursor: pointer;
            font-size: 28px;
            letter-spacing: -1px;
        }

        .search-box {
            display: flex;
            flex-grow: 0.5;
        }

        input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #333;
            border-radius: 20px 0 0 20px;
            background-color: #222;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: var(--accent-color);
            color: white;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #cc0000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* プレイヤーエリア */
        .player-section {
            display: none;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        #video-title {
            margin-top: 15px;
            font-size: 20px;
            font-weight: 600;
        }

        /* 動画グリッド */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-card:hover {
            transform: scale(1.02);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        .video-info {
            padding: 12px;
        }

        .video-card-title {
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 8px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .channel-title {
            font-size: 12px;
            color: #aaa;
        }

        .status-msg {
            text-align: center;
            color: #aaa;
            grid-column: 1 / -1;
            padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">eeetube</h1>
        <div class="search-box">
            <input type="text" id="main-input" placeholder="検索、またはYouTubeのURLを貼り付け...">
            <button id="main-btn" onclick="handleAction()">実行</button>
        </div>
    </header>

    <main class="container">
        <section class="player-section" id="player-section">
            <div class="video-container">
                <iframe id="youtube-player" src="" allowfullscreen></iframe>
            </div>
            <h2 id="video-title">動画再生中</h2>
        </section>

        <section class="video-grid" id="video-grid">
            <div class="status-msg">読み込み中...</div>
        </section>
    </main>

    <script>
        // 🛠️ 無料のパブリックAPIと、CORS制限を突破するプロキシを合体
        const CORS_PROXY = 'https://api.allorigins.win/get?url=';
        const API_BASE = 'https://vid.puffyan.us/api/v1'; // 安定したInvidiousのフリーAPI

        window.onload = () => {
            fetchTrendingVideos();
        };

        // ボタンが押された時、またはEnter時の処理
        function handleAction() {
            const inputVal = document.getElementById('main-input').value.trim();
            if (!inputVal) return;

            // URLまたは動画IDが直接入力された場合
            if (inputVal.includes('youtube.com') || inputVal.includes('youtu.be') || (inputVal.length === 11 && !inputVal.includes(' '))) {
                loadDirectVideo(inputVal);
            } else {
                // 通常のキーワードならパブリックAPIで検索
                searchVideos(inputVal);
            }
        }

        // 1. 【フリーAPI】トレンド動画の取得
        async function fetchTrendingVideos() {
            showStatus('日本の急上昇を読み込み中...');
            const targetUrl = `${API_BASE}/trending?region=JP`;
            
            try {
                // プロキシを経由させてセキュリティブロックを回避
                const response = await fetch(`${CORS_PROXY}${encodeURIComponent(targetUrl)}`);
                const outerData = await response.json();
                const data = JSON.parse(outerData.contents); // プロキシ特有のパース
                displayVideos(data);
            } catch (error) {
                console.error(error);
                showStatus('トレンドの取得に失敗しました。上の窓から検索、またはURLを直接貼り付けてみてください。');
            }
        }

        // 2. 【フリーAPI】動画検索
        async function searchVideos(query) {
            showStatus(`「${query}」の検索結果を読み込み中...`);
            const targetUrl = `${API_BASE}/search?q=${encodeURIComponent(query)}&type=video`;
            
            try {
                const response = await fetch(`${CORS_PROXY}${encodeURIComponent(targetUrl)}`);
                const outerData = await response.json();
                const data = JSON.parse(outerData.contents);
                if(!data || data.length === 0) {
                    showStatus('該当する動画が見つかりませんでした。');
                } else {
                    displayVideos(data);
                }
            } catch (error) {
                console.error(error);
                showStatus('検索中にエラーが発生しました。別のキーワードにするか、URL直接入力を試してください。');
            }
        }

        // 3. 【API不要】URLから直接再生するモード
        function loadDirectVideo(input) {
            let videoId = input;
            if (input.includes('youtube.com') || input.includes('youtu.be')) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
                const match = input.match(regExp);
                if (match && match[2].length === 11) {
                    videoId = match[2];
                } else {
                    alert('URLから動画IDを抽出できませんでした。');
                    return;
                }
            }
            playVideo(videoId, "直接指定された動画");
        }

        // 動画リストを画面に描画
        function displayVideos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            if (!Array.isArray(videos)) return;

            videos.forEach(video => {
                if (!video.videoId) return;

                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(video.videoId, video.title);

                let thumbUrl = 'https://via.placeholder.com/320x180?text=No+Image';
                if (video.videoThumbnails && video.videoThumbnails.length > 0) {
                    const mediumThumb = video.videoThumbnails.find(t => t.quality === 'medium') || video.videoThumbnails[0];
                    thumbUrl = mediumThumb.url;
                }

                card.innerHTML = `
                    <img class="thumbnail" src="${thumbUrl}" loading="lazy" alt="${video.title}">
                    <div class="video-info">
                        <p class="video-card-title">${video.title}</p>
                        <p class="channel-title">${video.author || '不明なチャンネル'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 動画再生
        function playVideo(videoId, title) {
            const playerSection = document.getElementById('player-section');
            const player = document.getElementById('youtube-player');
            const titleElement = document.getElementById('video-title');

            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            titleElement.textContent = title;
            playerSection.style.display = 'block';

            playerSection.scrollIntoView({ behavior: 'smooth' });
        }

        function showStatus(msg) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = `<div class="status-msg">${msg}</div>`;
        }

        // Enterキー対応
        document.getElementById('main-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleAction();
            }
        });
    </script>
</body>
</html>
