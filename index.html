<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D APEX</title>
    
    <link rel="icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/1f451/512.webp" type="image/webp">
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; margin: 10px; color: #eee; }
        .container { max-width: 600px; margin: 0 auto; background: #2a2a2a; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { font-size: 1.4rem; margin: 0 0 10px 0; color: #ffcc00; font-weight: bold; letter-spacing: 1px; }
        .input-group { margin-bottom: 10px; text-align: left; max-width: 80%; margin-left: auto; margin-right: auto; }
        label { font-size: 0.85rem; font-weight: bold; color: #aaa; display: block; margin-bottom: 3px; }
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #444; background: #111; color: #fff; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ffcc00; color: #111; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 5px; }
        button:hover { background: #ffee55; }
        .status { font-size: 0.85rem; color: #fff; margin: 8px 0; padding: 5px; background: #444; border-radius: 4px; font-weight: bold; }
        #gameCanvas { background: #2b4c1f; display: block; margin: 10px auto; border-radius: 4px; border: 2px solid #444; cursor: crosshair; }
        .hud { display: flex; justify-content: space-between; margin: 5px 10px; font-weight: bold; font-size: 0.9rem; background: #1f1f1f; padding: 8px; border-radius: 4px; }
        #result-area { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #result-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        #return-btn { width: auto; padding: 12px 30px; font-size: 1.1rem; background: #ffcc00; color: #111; }
    </style>
</head>
<body>
<div class="container">
    <h1
        2D APEX〜 </h1>
    
    <div id="login-area">
        <div class="input-group">
            <label for="username-input">ユーザー名:</label>
            <input type="text" id="username-input" placeholder="例: Wraith_Pro" value="Player">
        </div>
        <div class="input-group">
            <label for="room-id-input">マッチング部屋番号:</label>
            <input type="text" id="room-id-input" placeholder="例: apex1234">
        </div>
        <button id="join-btn">マッチに入る</button>
        <p class="status" id="status">準備ができたらボタンを押してください。</p>
    </div>

    <div id="game-area" style="display: none;">
        <div class="hud">
            <div id="my-hp-bar" style="color: #00ff00;">YOUR HP: 100</div>
            <div id="my-ammo-bar" style="color: #ffcc00;">AMMO: 30/30</div>
            <div id="peer-hp-bar" style="color: #ff3333;">ENEMY HP: 100</div>
        </div>

        <canvas id="gameCanvas" width="550" height="400"></canvas>
    </div>
</div>

<div id="result-area">
    <div id="result-title">YOU ARE THE CHAMPION</div>
    <button id="return-btn">ロビーに戻る</button>
</div>

<script>
    let peer = null, conn = null, myRole = "", gameActive = false;
    const loginArea = document.getElementById('login-area'), gameArea = document.getElementById('game-area');
    const resultArea = document.getElementById('result-area'), resultTitle = document.getElementById('result-title'), returnBtn = document.getElementById('return-btn');
    const usernameInput = document.getElementById('username-input'), roomIdInput = document.getElementById('room-id-input'), joinBtn = document.getElementById('join-btn'), statusEl = document.getElementById('status');
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d'), myHpEl = document.getElementById('my-hp-bar'), myAmmoEl = document.getElementById('my-ammo-bar'), peerHpEl = document.getElementById('peer-hp-bar');

    let myPlayer, peerPlayer, peerTarget, myBullets, peerBullets;
    const keys = {};
    let mouseX = 0, mouseY = 0;

    // 🗺️ 固定オブジェクトの設定（中央の壁、草むら、回復アイテム）
    const wall = { x: 265, y: 120, width: 20, height: 160 };
    const bush = { x: 120, y: 150, width: 70, height: 100 }; // 🟢 草むらエリア
    const medKit = { x: 260, y: 40, size: 16, active: true }; // ➕ 回復アイテム

    // ✈️ ドロップシップ（飛行機）の初期設定
    let dropShip = { x: -50, y: 200, speed: 2.5, isActive: true };

    function resetGameState() {
        // 💡 降下前は初期座標を画面外にして、お互いが被らないようにします
        myPlayer = { x: -999, y: -999, size: 22, hp: 100, isDead: false, name: "Player", isVisible: true, isFlying: true, ammo: 30, maxAmmo: 30, isReloading: false, reloadTimer: 0 };
        peerPlayer = { x: -999, y: -999, size: 22, hp: 100, isDead: false, name: "Enemy", isVisible: true, isFlying: true };
        peerTarget = { x: -999, y: -999 };
        myBullets = []; peerBullets = [];
        dropShip = { x: -50, y: 200, speed: 2.5, isActive: true };
        medKit.active = true;
    }
    resetGameState();

    joinBtn.addEventListener('click', () => {
        const roomValue = roomIdInput.value.trim();
        const nameValue = usernameInput.value.trim() || "Player";
        if (!roomValue) return;

        myPlayer.name = nameValue;
        joinBtn.disabled = true; roomIdInput.disabled = true; usernameInput.disabled = true;
        statusEl.innerText = 'マッチメイキング中...';

        myRole = "host";
        peer = new Peer(roomValue);
        peer.on('open', () => { statusEl.innerText = '他の部隊がドロップシップに搭乗するのを待っています...'; });
        peer.on('connection', (connection) => { conn = connection; setupGameConnection(); });
        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                myRole = "guest"; peer.destroy(); peer = new Peer();
                peer.on('open', () => {
                    statusEl.innerText = 'マッチにドロップインしました！';
                    conn = peer.connect(roomValue);
                    setupGameConnection();
                });
            }
        });
    });

    function setupGameConnection() {
        if (!conn) return;
        conn.on('data', (data) => {
            if (data.type === 'state') {
                peerTarget.x = data.x; peerTarget.y = data.y;
                peerPlayer.hp = data.hp; peerPlayer.name = data.name;
                peerPlayer.isFlying = data.isFlying;
                peerPlayer.isVisible = data.isVisible;
                if (data.hp <= 0 && !peerPlayer.isDead) { peerPlayer.isDead = true; endGame(true); }
            } else if (data.type === 'shoot' && !peerPlayer.isDead) {
                // サブマシンガン（SMG）の敵の弾速
                peerBullets.push({ x: data.x, y: data.y, vx: Math.cos(data.angle) * 8.5, vy: Math.sin(data.angle) * 8.5, life: 45 });
            } else if (data.type === 'medkit_taken') {
                medKit.active = false; // 相手が回復を取ったら消す同期
            }
        });
        conn.on('close', handleDisconnect); conn.on('error', handleDisconnect);
        if (conn.open) startGame(); else conn.on('open', startGame);
    }

    function startGame() {
        loginArea.style.display = 'none'; gameArea.style.display = 'block';
        gameActive = true;
        window.requestAnimationFrame(gameLoop);
    }

    function endGame(isWin) {
        gameActive = false;
        setTimeout(() => {
            resultArea.style.display = 'flex';
            if (isWin) { resultTitle.innerText = "🏆 👑 チャンピオン 👑 🏆"; resultTitle.style.color = "#ffcc00"; }
            else { resultTitle.innerText = "☠️ 部隊撃破 (DEFEATED) ☠️"; resultTitle.style.color = "#ff3333"; }
        }, 1000);
    }

    returnBtn.addEventListener('click', () => {
        if (conn) conn.close(); if (peer) peer.destroy();
        resultArea.style.display = 'none'; gameArea.style.display = 'none'; loginArea.style.display = 'block';
        joinBtn.disabled = false; roomIdInput.disabled = false; usernameInput.disabled = false;
        statusEl.innerText = 'ロビーに戻りました。';
        resetGameState();
    });

    function handleDisconnect() { if (gameActive) { alert('対戦相手との接続が切れました。'); returnBtn.click(); } }

    window.addEventListener('keydown', (e) => { 
        keys[e.key.toLowerCase()] = true; keys[e.key] = true; 
        // 💡 【リロード機能】Rキーが押されたらリロード開始
        if (e.key.toLowerCase() === 'r' && !myPlayer.isReloading && myPlayer.ammo < myPlayer.maxAmmo && !myPlayer.isFlying) {
            myPlayer.isReloading = true;
            myPlayer.reloadTimer = 75; // リロードにかかる時間（約1.2秒）
        }
    });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; keys[e.key] = false; });
    
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
    });

    // 🖱️ 【クリックで弾を発射する（サブマシンガン仕様）】
    canvas.addEventListener('mousedown', (e) => {
        if (myPlayer.isDead || !conn || !conn.open || !gameActive || myPlayer.isReloading || myPlayer.isFlying) return;

        // 💡 弾切れの時は撃てない
        if (myPlayer.ammo <= 0) {
            myPlayer.isReloading = true;
            myPlayer.reloadTimer = 75; // 自動リロード
            return;
        }

        const pX = myPlayer.x + myPlayer.size / 2;
        const pY = myPlayer.y + myPlayer.size / 2;
        const angle = Math.atan2(mouseY - pY, mouseX - pX);

        // サブマシンガン（SMG）カスタマイズ：少し弾速を速くし、射程を短く設定
        myBullets.push({ x: pX, y: pY, vx: Math.cos(angle) * 8.5, vy: Math.sin(angle) * 8.5, life: 45 });
        myPlayer.ammo--; // 弾を1発消費

        conn.send({ type: 'shoot', x: pX, y: pY, angle: angle });
    });

    function gameLoop() {
        if (!gameActive) return;

        // 💡 【足のスピード調整】少し足を遅くして戦術的に動けるように変更（3.5 ➡️ 2.4）
        const playerSpeed = 2.4;

        // ✈️ 1. ドロップシップの巡航と降下システム
        if (dropShip.isActive) {
            dropShip.x += dropShip.speed;
            if (dropShip.x > canvas.width + 50) {
                dropShip.isActive = false;
                // 最後まで降りなかったら強制ドロップ
                if (myPlayer.isFlying) { myPlayer.x = canvas.width - 50; myPlayer.y = dropShip.y; myPlayer.isFlying = false; }
            }
            // SpaceキーかEキーで飛行機から飛び降りる（着陸）
            if (myPlayer.isFlying && (keys[' '] || keys['e'])) {
                myPlayer.x = dropShip.x;
                myPlayer.y = dropShip.y;
                myPlayer.isFlying = false;
            }
        }

        // 🏃 2. プレイヤーの移動計算
        if (!myPlayer.isDead && !myPlayer.isFlying) {
            if ((keys['arrowup'] || keys['w']) && myPlayer.y > 0) { myPlayer.y -= playerSpeed; }
            if ((keys['arrowdown'] || keys['s']) && myPlayer.y < canvas.height - myPlayer.size) { myPlayer.y += playerSpeed; }
            if ((keys['arrowleft'] || keys['a']) && myPlayer.x > 0) { myPlayer.x -= playerSpeed; }
            if ((keys['arrowright'] || keys['d']) && myPlayer.x < canvas.width - myPlayer.size) { myPlayer.x += playerSpeed; }
        }

        // 🔄 3. リロードタイマーのカウント
        if (myPlayer.isReloading) {
            myPlayer.reloadTimer--;
            if (myPlayer.reloadTimer <= 0) {
                myPlayer.ammo = myPlayer.maxAmmo;
                myPlayer.isReloading = false;
            }
        }

        // 🌿 4. 草むら（ステルス）の判定（ブロスタ風）
        // 自分が草むらの中に完全に隠れているかどうかをチェック
        if (!myPlayer.isFlying && myPlayer.x > bush.x && myPlayer.x + myPlayer.size < bush.x + bush.width &&
            myPlayer.y > bush.y && myPlayer.y + myPlayer.size < bush.y + bush.height) {
            myPlayer.isVisible = false; // 隠れる！
        } else {
            myPlayer.isVisible = true;  // 丸見え！
        }

        // 🍿 5. 線形補間（Lerp）による敵の滑らかな位置同期
        if (!peerPlayer.isFlying) {
            peerPlayer.x += (peerTarget.x - peerPlayer.x) * 0.25;
            peerPlayer.y += (peerTarget.y - peerPlayer.y) * 0.25;
        } else {
            peerPlayer.x = -999; peerPlayer.y = -999; // 飛行中は画面から消す
        }

        // ➕ 6. 回復アイテム（シールドセル）の取得判定
        if (medKit.active && !myPlayer.isDead && !myPlayer.isFlying) {
            const pCenterX = myPlayer.x + myPlayer.size/2;
            const pCenterY = myPlayer.y + myPlayer.size/2;
            const dist = Math.hypot(pCenterX - medKit.x, pCenterY - medKit.y);
            if (dist < myPlayer.size/2 + medKit.size/2) {
                myPlayer.hp = Math.min(myPlayer.hp + 40, 100); // HPを40回復（最大100）
                medKit.active = false;
                conn.send({ type: 'medkit_taken' }); // 相手の画面からも消させる
            }
        }

        // 📡 7. データ送信
        if (conn && conn.open && !myPlayer.isDead) {
            conn.send({ type: 'state', x: myPlayer.x, y: myPlayer.y, hp: myPlayer.hp, name: myPlayer.name, isFlying: myPlayer.isFlying, isVisible: myPlayer.isVisible });
        }

        // 🚀 8. 弾丸と壁の当たり判定
        for (let i = myBullets.length - 1; i >= 0; i--) {
            let b = myBullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
            if (b.x > wall.x && b.x < wall.x + wall.width && b.y > wall.y && b.y < wall.y + wall.height) { myBullets.splice(i, 1); continue; }
            if (!peerPlayer.isDead && !peerPlayer.isFlying && b.x > peerPlayer.x && b.x < peerPlayer.x + peerPlayer.size && b.y > peerPlayer.y && b.y < peerPlayer.y + peerPlayer.size) {
                myBullets.splice(i, 1); continue;
            }
            if (b.life <= 0) myBullets.splice(i, 1);
        }

        for (let i = peerBullets.length - 1; i >= 0; i--) {
            let b = peerBullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
            if (b.x > wall.x && b.x < wall.x + wall.width && b.y > wall.y && b.y < wall.y + wall.height) { peerBullets.splice(i, 1); continue; }
            if (!myPlayer.isDead && !myPlayer.isFlying && b.x > myPlayer.x && b.x < myPlayer.x + myPlayer.size && b.y > myPlayer.y && b.y < myPlayer.y + myPlayer.size) {
                myPlayer.hp -= 12; // SMGの1発当たりのダメージ
                if (myPlayer.hp <= 0) { myPlayer.hp = 0; myPlayer.isDead = true; endGame(false); }
                peerBullets.splice(i, 1); continue;
            }
            if (b.life <= 0) peerBullets.splice(i, 1);
        }

        // 🎛️ 9. HUD表示の更新
        myHpEl.innerText = `YOUR HP: ${myPlayer.hp} ${myPlayer.isDead ? '☠️' : ''}`;
        myAmmoEl.innerText = myPlayer.isReloading ? `🔄 RELOADING...` : `AMMO: ${myPlayer.ammo}/${myPlayer.maxAmmo} [Rキーでリロード]`;
        peerHpEl.innerText = `${peerPlayer.name} HP: ${peerPlayer.hp} ${peerPlayer.isDead ? '☠️' : ''}`;

        // 🎨 10. 全体の描画処理
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 🌿 【草むらの描画】
        ctx.fillStyle = 'rgba(19, 64, 14, 0.85)';
        ctx.fillRect(bush.x, bush.y, bush.width, bush.height);

        // 🧱 【中央の壁の描画】
        ctx.fillStyle = '#666';
        ctx.fillRect(wall.x, wall.y, wall.width, wall.height);

        // ➕ 【回復アイテム（メディキット）の描画】
        if (medKit.active) {
            ctx.fillStyle = '#ffffff'; ctx.fillRect(medKit.x - medKit.size/2, medKit.y - medKit.size/2, medKit.size, medKit.size);
            ctx.fillStyle = '#ff0000'; ctx.fillRect(medKit.x - 2, medKit.y - medKit.size/2 + 2, 4, medKit.size - 4);
            ctx.fillRect(medKit.x - medKit.size/2 + 2, medKit.y - 2, medKit.size - 4, 4);
        }

        // 🟢 【自分プレイヤーの描画（丸型・ブロスタ風）】
        if (!myPlayer.isFlying) {
            // 草むらの中にいるときは少し透明にする
            ctx.globalAlpha = myPlayer.isVisible ? 1.0 : 0.4;
            ctx.fillStyle = myPlayer.isDead ? '#555' : myPlayer.color;
            ctx.beginPath();
            ctx.arc(myPlayer.x + myPlayer.size/2, myPlayer.y + myPlayer.size/2, myPlayer.size/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;

            ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif';
            ctx.fillText(myPlayer.name, myPlayer.x - 5, myPlayer.y - 5);
        }

        // 🔴 【敵プレイヤーの描画】
        // 敵が「生存している」かつ「飛行中でない」かつ「草むらに隠れていない」ときだけ描画
        if (!peerPlayer.isDead && !peerPlayer.isFlying && peerPlayer.isVisible) {
            ctx.fillStyle = peerPlayer.color;
            ctx.beginPath();
            ctx.arc(peerPlayer.x + peerPlayer.size/2, peerPlayer.y + peerPlayer.size/2, peerPlayer.size/2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.fillText(peerPlayer.name, peerPlayer.x - 5, peerPlayer.y - 5);
        }

        // ✈️ 【ドロップシップ（飛行機）の描画】
        if (dropShip.isActive) {
            ctx.fillStyle = '#888';
            ctx.fillRect(dropShip.x - 25, dropShip.y - 10, 50, 20); // 飛行機本体
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(dropShip.x - 5, dropShip.y - 15, 10, 5);  // コックピット
            
            if (myPlayer.isFlying) {
                ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif';
                ctx.fillText('🚀 SPACEまたはEキーで降下！', dropShip.x - 60, dropShip.y + 30);
            }
        }

        // ☄️ 弾の描画
        ctx.fillStyle = '#ffff00'; myBullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));
        ctx.fillStyle = '#ff00ff'; peerBullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));

        window.requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
