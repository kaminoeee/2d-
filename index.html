<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">英語学習ポータル - English Study Room</title>
    <link id="dynamic-favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --accent-color: #ff0000;
            --sidebar-bg: #161616;
            --card-bg: #1f1f1f;
            --active-bg: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333333;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .hidden { display: none !important; }

        /* --- 【表】学習サイト用 --- */
        #dummy-study-site { width: 100vw; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; text-align: center; }
        .study-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .word-card { font-size: 24px; font-weight: bold; color: #2c3e50; margin: 20px 0; padding: 20px; background: #ecf0f1; border-radius: 6px; }
        .gate-input-wrapper { margin-top: 40px; border-top: 1px dashed #ccc; padding-top: 20px; }
        .gate-input { padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; width: 60%; text-align: center; outline: none; }

        /* --- 【裏】eeetube用 --- */
        body.dark-mode { background-color: var(--bg-color); color: var(--text-color); }
        aside { width: 240px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; border-right: 1px solid #222; flex-shrink: 0; }
        .logo-area { padding: 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; }
        
        /* YouTube風カスタムアイコン */
        .yt-icon { width: 32px; height: 22px; background-color: var(--accent-color); border-radius: 6px; position: relative; display: inline-block; }
        .yt-icon::after { content: ''; position: absolute; border-left: 8px solid white; border-top: 5px solid transparent; border-bottom: 5px solid transparent; top: 6px; left: 13px; }
        
        .logo-area h1 { color: #fff; margin: 0; cursor: pointer; font-size: 22px; letter-spacing: -1px; font-weight: bold; }
        .logo-area span { color: var(--accent-color); }
        .menu-list { list-style: none; padding: 10px 0; margin: 0; }
        .menu-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; font-weight: 600; transition: background 0.2s; color: #aaa; }
        .menu-item:hover { background-color: #222; color: #fff; }
        .menu-item.active { background-color: var(--active-bg); color: #fff; border-left: 4px solid var(--accent-color); padding-left: 16px; }

        main { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 160px; }
        .input-wrapper { max-width: 800px; width: 100%; margin: 0 auto; display: flex; }
        main input { width: 100%; padding: 12px 20px; border: 1px solid #333; border-radius: 24px 0 0 24px; background-color: #222; color: #fff; font-size: 16px; outline: none; }
        main button { padding: 12px 28px; border: none; background-color: var(--accent-color); color: white; border-radius: 0 24px 24px 0; cursor: pointer; font-size: 16px; font-weight: bold; flex-shrink: 0; }

        .player-section { display: none; background-color: var(--card-bg); padding: 15px; border-radius: 12px; max-width: 900px; width: 100%; margin: 0 auto; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        #video-title { margin-top: 15px; font-size: 18px; font-weight: 600; color: #fff; }

        .content-panel { display: none; max-width: 1200px; width: 100%; margin: 0 auto; }
        .content-panel.active { display: block; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .video-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: scale(1.02); }
        .thumbnail { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }
        .video-info { padding: 12px; color: #fff; }
        .video-card-title { font-size: 13px; font-weight: bold; margin: 0 0 6px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .channel-title { font-size: 11px; color: #aaa; }
        .direct-info-box { background-color: var(--card-bg); padding: 40px 20px; border-radius: 12px; text-align: center; color: #aaa; max-width: 600px; margin: 40px auto 0 auto; }
        .status-msg { text-align: center; color: #aaa; padding: 40px; font-size: 14px; }

        /* 📋 システムログコンソール */
        #log-console {
            position: fixed; bottom: 0; right: 0; left: 240px; height: 120px;
            background-color: #050505; border-top: 2px solid #222; color: #00ff00;
            font-family: 'Courier New', Courier, monospace; font-size: 12px; padding: 10px;
            box-sizing: border-box; overflow-y: auto; z-index: 9999;
        }
        .log-entry { margin: 2px 0; }
        .log-fail { color: #ff3333; }
        .log-success { color: #33ff33; }
        .log-info { color: #33b5ff; }
    </style>
</head>
<body>

    <div id="dummy-study-site">
        <div class="study-container">
            <h2>毎日英単語トレーニング</h2>
            <p>本日の重要ワード</p>
            <div class="word-card">
                persistence <br>
                <span style="font-size: 16px; color:#7f8c8d; font-weight: normal;">【名】粘り強さ、不屈の努力</span>
            </div>
            <div class="gate-input-wrapper">
                <input type="password" class="gate-input" id="gate-pass" placeholder="Enter password..." oninput="checkPassword()">
            </div>
        </div>
    </div>

    <aside id="true-sidebar" class="hidden">
        <div class="logo-area">
            <div class="yt-icon"></div>
            <h1>eee<span>TUBE</span></h1>
        </div>
        <ul class="menu-list">
            <li class="menu-item active" id="menu-trend" onclick="switchMode('trend')">🔥 急上昇トレンド</li>
            <li class="menu-item" id="menu-search" onclick="switchMode('search')">🔍 動画検索</li>
            <li class="menu-item" id="menu-direct" onclick="switchMode('direct')">🔗 URL直打ち再生</li>
        </ul>
    </aside>

    <main id="true-main" class="hidden">
        <section class="player-section" id="player-section">
            <div class="video-container">
                <iframe id="youtube-player" src="" allowfullscreen></iframe>
            </div>
            <h2 id="video-title">動画再生中</h2>
        </section>

        <div class="content-panel active" id="panel-trend">
            <div class="video-grid" id="trend-grid"><div class="status-msg">読み込み中...</div></div>
        </div>

        <div class="content-panel" id="panel-search">
            <div class="input-wrapper">
                <input type="text" id="search-input" placeholder="検索キーワードを入力...">
                <button onclick="searchVideos()">検索</button>
            </div>
            <div class="video-grid" id="search-grid" style="margin-top: 20px;"><div class="status-msg">キーワードを入力してください。</div></div>
        </div>

        <div class="content-panel" id="panel-direct">
            <div class="input-wrapper">
                <input type="text" id="direct-input" placeholder="YouTube動画のURL または 動画ID を貼り付け...">
                <button onclick="loadDirectVideo()">再生</button>
            </div>
            <div class="direct-info-box">
                <h3>URL直接入力モード</h3>
                <p>外部APIサーバーを一切介さないため、100%確実に再生可能です。</p>
            </div>
        </div>
    </main>

    <div id="log-console" class="hidden">
        <div class="log-entry log-info">[SYSTEM] eeetube core terminal initialized.</div>
    </div>

    <script>
        // 🔒 パスワードチェック
        function checkPassword() {
            if (document.getElementById('gate-pass').value === 'eeeisgod') {
                activateEeeTube();
            }
        }

        // 💥 裏モード起動 ＆ アイコン切り替え
        function activateEeeTube() {
            document.getElementById('dummy-study-site').style.display = 'none';
            document.getElementById('true-sidebar').classList.remove('hidden');
            document.getElementById('true-main').classList.remove('hidden');
            document.getElementById('log-console').classList.remove('hidden');
            document.body.classList.add('dark-mode');
            document.getElementById('site-title').textContent = 'eeeTUBE';
            
            // 🔴 タブのアイコンをYouTube風（赤地に白再生ボタン）に変更
            const favicon = document.getElementById('dynamic-favicon');
            favicon.setAttribute('href', 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%2270%22 y=%2215%22 rx=%2220%22 fill=%22%23ff0000%22/><polygon points=%2240,30 70,50 40,70%22 fill=%22%23ffffff%22/></svg>');

            addLog('認証成功。スタンドアロン高速エンジン起動。', 'success');
            fetchTrendingVideos();
        }

        // 📋 ログ追加
        function addLog(text, type = 'info') {
            const consoleEl = document.getElementById('log-console');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function switchMode(mode) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.content-panel').forEach(el => el.classList.remove('active'));
            document.getElementById(`menu-${mode}`).classList.add('active');
            document.getElementById(`panel-${mode}`).classList.add('active');
        }

        // 🛠️ 2026年現在最も安定しているPiped APIインスタンスの直叩きリスト（CORSプロキシ不要な場所を選択）
        const PIPED_SERVERS = [
            { name: 'API_1 (Kavin)', url: 'https://pipedapi.kavin.rocks' },
            { name: 'API_2 (Moomoo)', url: 'https://pipedapi.moomoo.me' },
            { name: 'API_3 (Sync)', url: 'https://api.piped.sync.top' }
        ];

        // 🚀 自動フォールバックエンジン（失敗したら即座に次を実行）
        async function fetchPipedData(action, query = '') {
            for (let i = 0; i < PIPED_SERVERS.length; i++) {
                const server = PIPED_SERVERS[i];
                const targetUrl = action === 'trend' 
                    ? `${server.url}/trending?region=JP` 
                    : `${server.url}/search?q=${encodeURIComponent(query)}&filter=videos`;

                addLog(`${server.name} にリクエスト送信中...`, 'info');

                try {
                    // タイムアウト設定付きのfetch
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000); // 6秒でタイムアウト

                    const res = await fetch(targetUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    
                    const list = action === 'trend' ? data : data.items;
                    if (list && list.length > 0) {
                        addLog(`${server.name} からのデータ取得に成功！`, 'success');
                        return list.map(item => ({
                            videoId: item.url ? item.url.split('v=')[1] : item.id,
                            title: item.title,
                            author: item.uploaderName || '不明なチャンネル',
                            thumbnail: item.thumbnail
                        }));
                    }
                } catch (e) {
                    addLog(`${server.name} が応答しないかエラーです。次を実行します。`, 'fail');
                }
            }
            throw new Error('All APIs failed');
        }

        // トレンド取得
        async function fetchTrendingVideos() {
            const grid = document.getElementById('trend-grid');
            grid.innerHTML = '<div class="status-msg">急上昇を読み込み中...</div>';
            try {
                const data = await fetchPipedData('trend');
                displayVideos(data, 'trend-grid');
            } catch (error) {
                grid.innerHTML = '<div class="status-msg">⚠️ 公開APIが混雑しています。動画を直接見る場合は「URL直打ち再生」モードに切り替えてください。</div>';
                addLog('全APIサーバーの自動試行に失敗しました。', 'fail');
            }
        }

        // 検索処理
        async function searchVideos() {
            const query = document.getElementById('search-input').value.trim();
            const grid = document.getElementById('search-grid');
            if (!query) return;

            grid.innerHTML = `<div class="status-msg">「${query}」を検索中...</div>`;
            try {
                const data = await fetchPipedData('search', query);
                if(!data || data.length === 0) {
                    grid.innerHTML = '<div class="status-msg">該当する動画が見つかりませんでした。</div>';
                } else {
                    displayVideos(data, 'search-grid');
                }
            } catch (error) {
                grid.innerHTML = '<div class="status-msg">⚠️ 検索に失敗しました。「URL直接入力」モードを試してください。</div>';
                addLog('検索に失敗しました。', 'fail');
            }
        }

        // URL直打ち
        function loadDirectVideo() {
            const input = document.getElementById('direct-input').value.trim();
            if (!input) return;

            let videoId = input;
            if (input.includes('youtube.com') || input.includes('youtu.be')) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
                const match = input.match(regExp);
                if (match && match[2].length === 11) {
                    videoId = match[2];
                } else {
                    alert('URLから動画IDを抽出できませんでした。');
                    return;
                }
            }
            if(videoId.length !== 11) {
                alert('正しい11文字の動画ID、またはURLを入力してください。');
                return;
            }
            playVideo(videoId, "直接指定された動画");
        }

        // 共通描画
        function displayVideos(videos, targetGridId) {
            const grid = document.getElementById(targetGridId);
            grid.innerHTML = '';
            if (!Array.isArray(videos)) return;

            videos.forEach(video => {
                if (!video.videoId) return;
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(video.videoId, video.title);

                card.innerHTML = `
                    <img class="thumbnail" src="${video.thumbnail}" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180?text=No+Image'">
                    <div class="video-info">
                        <p class="video-card-title">${video.title}</p>
                        <p class="channel-title">${video.author}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 再生
        function playVideo(videoId, title) {
            const playerSection = document.getElementById('player-section');
            const player = document.getElementById('youtube-player');
            const titleElement = document.getElementById('video-title');

            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            titleElement.textContent = title;
            playerSection.style.display = 'block';
            playerSection.scrollIntoView({ behavior: 'smooth' });
            addLog(`埋め込みプレイヤーを起動しました (ID: ${videoId})`, 'success');
        }

        document.getElementById('search-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') searchVideos(); });
        document.getElementById('direct-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') loadDirectVideo(); });
    </script>
</body>
</html>
