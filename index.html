<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eeetube - Pure Player Instance</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --accent-color: #ff0000;
            --card-bg: #1f1f1f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 40px auto 20px auto;
        }

        h1 {
            color: var(--accent-color);
            margin: 0 0 20px 0;
            font-size: 42px;
            letter-spacing: -1px;
        }

        .search-box {
            display: flex;
            max-width: 600px;
            margin: 0 auto;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid #333;
            border-radius: 30px 0 0 30px;
            background-color: #222;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 15px 30px;
            border: none;
            background-color: var(--accent-color);
            color: white;
            border-radius: 0 30px 30px 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #cc0000;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .player-section {
            display: none;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-msg {
            text-align: center;
            color: #888;
            margin-top: 50px;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">eeetube</h1>
        <div class="search-box">
            <input type="text" id="url-input" placeholder="YouTubeのURL または 動画ID を入力...">
            <button onclick="loadVideo()">再生</button>
        </div>
    </header>

    <main class="container">
        <section class="player-section" id="player-section">
            <div class="video-container">
                <iframe id="youtube-player" src="" allowfullscreen></iframe>
            </div>
        </section>

        <div class="info-msg" id="info-msg">
            YouTubeの動画URL（例: https://www.youtube.com/watch?v=xxxxxx）を<br>
            上のボックスに貼り付けて「再生」を押してください。<br>
            外部APIを一切使わないため、サーバーエラーなしで永続的に動作します。
        </div>
    </main>

    <script>
        function loadVideo() {
            const input = document.getElementById('url-input').value.trim();
            if (!input) return;

            let videoId = input;

            // URLから動画ID（v=xxxxxx や shorts/xxxxxx）を抽出する処理
            if (input.includes('youtube.com') || input.includes('youtu.be')) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
                const match = input.match(regExp);
                if (match && match[2].length === 11) {
                    videoId = match[2];
                } else {
                    alert('YouTubeのURLを正しく解析できませんでした。動画IDを直接入力してください。');
                    return;
                }
            }

            if (videoId.length !== 11) {
                alert('有効な動画ID（11文字）またはURLを入力してください。');
                return;
            }

            const playerSection = document.getElementById('player-section');
            const player = document.getElementById('youtube-player');
            const infoMsg = document.getElementById('info-msg');

            // 埋め込みプレイヤーを展開
            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            playerSection.style.display = 'block';
            infoMsg.style.style = 'none';

            playerSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Enterキー対応
        document.getElementById('url-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadVideo();
            }
        });
    </script>
</body>
</html>
