<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D APEX (Enhanced)</title>
    <link rel="icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/1f451/512.webp" type="image/webp">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; margin: 10px; color: #eee; }
        .container { max-width: 600px; margin: 0 auto; background: #2a2a2a; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { font-size: 1.4rem; margin: 0 0 10px 0; color: #ffcc00; font-weight: bold; letter-spacing: 1px; }
        .input-group { margin-bottom: 10px; text-align: left; max-width: 80%; margin-left: auto; margin-right: auto; }
        label { font-size: 0.85rem; font-weight: bold; color: #aaa; display: block; margin-bottom: 3px; }
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #444; background: #111; color: #fff; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ffcc00; color: #111; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 5px; }
        button:hover { background: #ffee55; }
        .status { font-size: 0.85rem; color: #fff; margin: 8px 0; padding: 5px; background: #444; border-radius: 4px; font-weight: bold; }
        #gameCanvas { background: #2b4c1f; display: block; margin: 10px auto; border-radius: 4px; border: 2px solid #444; cursor: crosshair; }
        .hud { display: flex; justify-content: space-between; margin: 5px 10px; font-weight: bold; font-size: 0.9rem; background: #1f1f1f; padding: 8px; border-radius: 4px; }
        #result-area { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #result-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; }
        #return-btn { width: auto; padding: 12px 30px; font-size: 1.1rem; background: #ffcc00; color: #111; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .chat-promo { background: #1f1f1f; border: 1px dashed #ffcc00; border-radius: 6px; padding: 10px; margin-top: 15px; text-align: left; }
        .chat-promo p { margin: 0 0 8px 0; font-size: 0.85rem; font-weight: bold; color: #ffcc00; }
        .chat-links { display: flex; gap: 10px; }
        .chat-links a { flex: 1; text-align: center; background: #333; color: #fff; padding: 6px; border-radius: 4px; font-size: 0.8rem; text-decoration: none; font-weight: bold; border: 1px solid #444; }
        .chat-links a:hover { background: #444; border-color: #ffcc00; }
    </style>
</head>
<body>
<div class="container">
    <h1>2D APEX</h1>
    
    <div id="login-area">
        <div class="input-group">
            <label for="username-input">ユーザー名:</label>
            <input type="text" id="username-input" placeholder="例: Wraith_Pro" value="Player">
        </div>
        <div class="input-group">
            <label for="room-id-input">マッチング部屋番号:</label>
            <input type="text" id="room-id-input" placeholder="例: apex1234">
        </div>
        <button id="join-btn">マッチにドロップイン</button>
        <p class="status" id="status">準備ができたらボタンを押してください。</p>

        <div class="chat-promo">
            <p>💬 一緒に遊ぶ仲間を募集しよう！どちらでもチャット可能：</p>
            <div class="chat-links">
                <a href="https://kaminoeee.github.io/chat/" target="_blank">チャットサイト (URL1)</a>
                <a href="https://proxykoukanjoeeech.vercel.app/" target="_blank">チャットサイト (URL2)</a>
            </div>
        </div>
    </div>

    <div id="game-area" style="display: none;">
        <div class="hud">
            <div id="my-hp-bar" style="color: #00ff00;">YOUR HP: 100</div>
            <div id="my-ammo-bar" style="color: #ffcc00;">AMMO: 30/30</div>
            <div id="peer-hp-bar" style="color: #ff3333;">ENEMY HP: 100</div>
        </div>
        <canvas id="gameCanvas" width="550" height="400"></canvas>
    </div>
</div>

<div id="result-area">
    <div id="result-title">YOU ARE THE CHAMPION</div>
    <button id="return-btn">ロビーに戻る</button>
</div>

<script>
    let peer = null, conn = null, myRole = "", gameActive = false, resultShown = false;
    const loginArea = document.getElementById('login-area'), gameArea = document.getElementById('game-area');
    const resultArea = document.getElementById('result-area'), resultTitle = document.getElementById('result-title'), returnBtn = document.getElementById('return-btn');
    const usernameInput = document.getElementById('username-input'), roomIdInput = document.getElementById('room-id-input'), joinBtn = document.getElementById('join-btn'), statusEl = document.getElementById('status');
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d'), myHpEl = document.getElementById('my-hp-bar'), myAmmoEl = document.getElementById('my-ammo-bar'), peerHpEl = document.getElementById('peer-hp-bar');

    let myPlayer, peerPlayer, peerTarget, myBullets, peerBullets;
    const keys = {};
    let mouseX = 0, mouseY = 0, isMouseDown = false, shootCooldown = 0;

    // 壁、草むら、回復キットをすべてHost側でランダム生成するように変更
    let walls = [];
    let bushes = [];
    let medKits = [];

    let dropShip = { x: -50, y: 200, speed: 2.5, isActive: true };

    let myHpBarTimer = 0;
    let peerHpBarTimer = 0;

    // 【新規】マップ全体のランダム生成関数（Host用）
    function generateHostMap() {
        bushes = [];
        medKits = [];
        walls = [];

        // 🧱 壁のランダム生成 (3〜4個)
        const wallCount = Math.floor(Math.random() * 2) + 3; 
        for (let i = 0; i < wallCount; i++) {
            walls.push({
                x: Math.floor(Math.random() * 350) + 80,
                y: Math.floor(Math.random() * 200) + 60,
                width: Math.random() > 0.5 ? 25 : 80,  // 縦長か横長か
                height: Math.random() > 0.5 ? 100 : 25
            });
        }

        // 🌿 草むらのランダム生成
        for (let i = 0; i < 3; i++) {
            bushes.push({
                x: Math.floor(Math.random() * 380) + 60,
                y: Math.floor(Math.random() * 240) + 60,
                width: 85, height: 75
            });
        }

        // ➕ 医療キットのランダム生成
        for (let i = 0; i < 5; i++) {
            medKits.push({
                id: i,
                x: Math.floor(Math.random() * 450) + 40,
                y: Math.floor(Math.random() * 300) + 40,
                size: 14, active: true
            });
        }
    }

    function resetGameState() {
        myPlayer = { x: -999, y: -999, size: 22, hp: 100, isDead: false, name: "Player", isVisible: true, isFlying: true, ammo: 30, maxAmmo: 30, isReloading: false, reloadTimer: 0, color: '#00ff00' };
        peerPlayer = { x: -999, y: -999, size: 22, hp: 100, isDead: false, name: "Enemy", isVisible: true, isFlying: true, color: '#ff3333' };
        peerTarget = { x: -999, y: -999 };
        myBullets = []; peerBullets = [];
        dropShip = { x: -50, y: 200, speed: 2.5, isActive: true };
        isMouseDown = false; shootCooldown = 0;
        myHpBarTimer = 0; peerHpBarTimer = 0;
        resultShown = false;
        walls = []; bushes = []; medKits = [];
    }
    resetGameState();

    joinBtn.addEventListener('click', () => {
        const roomValue = roomIdInput.value.trim();
        const nameValue = usernameInput.value.trim() || "Player";
        if (!roomValue) return;

        myPlayer.name = nameValue;
        joinBtn.disabled = true; roomIdInput.disabled = true; usernameInput.disabled = true;
        statusEl.innerText = 'マッチメイキング中...';

        myRole = "host";
        peer = new Peer(roomValue);
        
        peer.on('open', () => { 
            statusEl.innerText = '他の部隊がドロップシップに搭乗するのを待っています...'; 
            generateHostMap(); // マップをランダム生成
        });
        
        peer.on('connection', (connection) => { 
            conn = connection; 
            setupGameConnection(); 
        });
        
        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                myRole = "guest"; peer.destroy(); peer = new Peer();
                peer.on('open', () => {
                    statusEl.innerText = 'マッチにドロップインしました！';
                    conn = peer.connect(roomValue);
                    setupGameConnection();
                });
            }
        });
    });

    function setupGameConnection() {
        if (!conn) return;

        if (myRole === "host") {
            setTimeout(() => {
                // 壁（walls）の情報も合わせて同期するよう拡張
                conn.send({ type: 'map_sync', bushes: bushes, medKits: medKits, walls: walls });
            }, 500);
        }

        conn.on('data', (data) => {
            if (data.type === 'map_sync') {
                bushes = data.bushes;
                medKits = data.medKits;
                walls = data.walls; // ゲスト側でランダム壁を受け取る
            } else if (data.type === 'state') {
                peerTarget.x = data.x; peerTarget.y = data.y;
                peerPlayer.hp = data.hp; peerPlayer.name = data.name;
                peerPlayer.isFlying = data.isFlying;
                peerPlayer.isVisible = data.isVisible;
                peerPlayer.isDead = data.isDead;
                
                if (peerPlayer.isDead && !resultShown) { endGame(true); }
            } else if (data.type === 'shoot') {
                peerBullets.push({ x: data.x, y: data.y, vx: Math.cos(data.angle) * 9.5, vy: Math.sin(data.angle) * 9.5, life: 40 });
            } else if (data.type === 'medkit_taken') {
                let kit = medKits.find(k => k.id === data.id);
                if (kit) kit.active = false;
            } else if (data.type === 'hit_happen') {
                peerHpBarTimer = data.inBush ? 60 : 120;
            } else if (data.type === 'game_over_signal') {
                if (data.loser === myPlayer.name && !resultShown) { endGame(false); }
                if (data.winner === myPlayer.name && !resultShown) { endGame(true); }
            }
        });
        conn.on('close', handleDisconnect); conn.on('error', handleDisconnect);
        if (conn.open) startGame(); else conn.on('open', startGame);
    }

    function startGame() {
        loginArea.style.display = 'none'; gameArea.style.display = 'block';
        gameActive = true;
        window.requestAnimationFrame(gameLoop);
    }

    function endGame(isWin) {
        resultShown = true;
        resultArea.style.display = 'flex';
        if (isWin) { resultTitle.innerText = "🏆 👑 チャンピオン 👑 🏆"; resultTitle.style.color = "#ffcc00"; }
        else { resultTitle.innerText = "☠️ 部隊全滅 (DEFEATED) ☠️"; resultTitle.style.color = "#ff3333"; }
    }

    returnBtn.addEventListener('click', () => {
        gameActive = false;
        if (conn) conn.close(); if (peer) peer.destroy();
        resultArea.style.display = 'none'; gameArea.style.display = 'none'; loginArea.style.display = 'block';
        joinBtn.disabled = false; roomIdInput.disabled = false; usernameInput.disabled = false;
        statusEl.innerText = 'ロビーに戻りました。';
        resetGameState();
    });

    function handleDisconnect() { if (gameActive) { alert('対戦相手との接続が切れました。'); returnBtn.click(); } }

    window.addEventListener('keydown', (e) => { 
        keys[e.key.toLowerCase()] = true; keys[e.key] = true; 
        if (e.key.toLowerCase() === 'r' && !myPlayer.isReloading && myPlayer.ammo < myPlayer.maxAmmo && !myPlayer.isFlying && !myPlayer.isDead) {
            myPlayer.isReloading = true;
            myPlayer.reloadTimer = 75; 
        }
    });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; keys[e.key] = false; });
    
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
    });

    canvas.addEventListener('mousedown', (e) => { isMouseDown = true; });
    window.addEventListener('mouseup', (e) => { isMouseDown = false; });

    function fireSMG() {
        if (myPlayer.isDead || !conn || !conn.open || !gameActive || myPlayer.isReloading || myPlayer.isFlying) return;
        if (myPlayer.ammo <= 0) { myPlayer.isReloading = true; myPlayer.reloadTimer = 75; return; }

        const pX = myPlayer.x + myPlayer.size / 2;
        const pY = myPlayer.y + myPlayer.size / 2;
        const angle = Math.atan2(mouseY - pY, mouseX - pX);

        const spread = (Math.random() - 0.5) * 0.08;
        myBullets.push({ x: pX, y: pY, vx: Math.cos(angle + spread) * 9.5, vy: Math.sin(angle + spread) * 9.5, life: 40 });
        myPlayer.ammo--; 

        conn.send({ type: 'shoot', x: pX, y: pY, angle: angle + spread });
        shootCooldown = 6; 
    }

    function checkWallCollision(nextX, nextY, size) {
        for (let w of walls) {
            if (nextX + size > w.x && nextX < w.x + w.width &&
                nextY + size > w.y && nextY < w.y + w.height) {
                return true; 
            }
        }
        return false;
    }

    // 【新規】壁にハマった時に外へ押し出す関数
    function resolveWallStack() {
        let attempts = 0;
        // もし壁の中にいたら、外に出るまで少しずつ下にずらす（最大100ピクセル分試行）
        while (checkWallCollision(myPlayer.x, myPlayer.y, myPlayer.size) && attempts < 50) {
            myPlayer.y += 4;
            attempts++;
        }
        // それでもダメなら、画面上部の安全圏へ強制退避
        if (checkWallCollision(myPlayer.x, myPlayer.y, myPlayer.size)) {
            myPlayer.x = 20;
            myPlayer.y = 20;
        }
    }

    function gameLoop() {
        if (!gameActive) return;

        const playerSpeed = 1.7;

        if (dropShip.isActive) {
            dropShip.x += dropShip.speed;
            if (dropShip.x > canvas.width + 50) {
                dropShip.isActive = false;
                if (myPlayer.isFlying) { 
                    myPlayer.x = canvas.width - 50; myPlayer.y = dropShip.y; myPlayer.isFlying = false; 
                    resolveWallStack(); // 降下完了時にハマり判定
                }
            }
            if (myPlayer.isFlying && (keys[' '] || keys['e'])) {
                myPlayer.x = dropShip.x; myPlayer.y = dropShip.y; myPlayer.isFlying = false;
                resolveWallStack(); // 手動降下時にハマり判定
            }
        }

        if (!myPlayer.isDead && !myPlayer.isFlying) {
            let nextX = myPlayer.x;
            let nextY = myPlayer.y;

            if (keys['arrowup'] || keys['w']) { 
                if (nextY - playerSpeed > 0 && !checkWallCollision(nextX, nextY - playerSpeed, myPlayer.size)) {
                    nextY -= playerSpeed;
                }
            }
            if (keys['arrowdown'] || keys['s']) { 
                if (nextY + playerSpeed < canvas.height - myPlayer.size && !checkWallCollision(nextX, nextY + playerSpeed, myPlayer.size)) {
                    nextY += playerSpeed;
                }
            }
            if (keys['arrowleft'] || keys['a']) { 
                if (nextX - playerSpeed > 0 && !checkWallCollision(nextX - playerSpeed, nextY, myPlayer.size)) {
                    nextX -= playerSpeed;
                }
            }
            if (keys['arrowright'] || keys['d']) { 
                if (nextX + playerSpeed < canvas.width - myPlayer.size && !checkWallCollision(nextX + playerSpeed, nextY, myPlayer.size)) {
                    nextX += playerSpeed;
                }
            }

            myPlayer.x = nextX;
            myPlayer.y = nextY;
        }

        if (shootCooldown > 0) shootCooldown--;
        if (isMouseDown && shootCooldown === 0) { fireSMG(); }

        if (myPlayer.isReloading) {
            myPlayer.reloadTimer--;
            if (myPlayer.reloadTimer <= 0) { myPlayer.ammo = myPlayer.maxAmmo; myPlayer.isReloading = false; }
        }

        let inBush = false;
        if (!myPlayer.isFlying && !myPlayer.isDead) {
            for (let b of bushes) {
                if (myPlayer.x > b.x && myPlayer.x + myPlayer.size < b.x + b.width &&
                    myPlayer.y > b.y && myPlayer.y + myPlayer.size < b.y + b.height) {
                    inBush = true; break;
                }
            }
        }
        myPlayer.isVisible = !inBush;

        if (!peerPlayer.isFlying) {
            peerPlayer.x += (peerTarget.x - peerPlayer.x) * 0.25;
            peerPlayer.y += (peerTarget.y - peerPlayer.y) * 0.25;
        } else {
            peerPlayer.x = -999; peerPlayer.y = -999;
        }

        if (!myPlayer.isDead && !myPlayer.isFlying) {
            const pCenterX = myPlayer.x + myPlayer.size/2;
            const pCenterY = myPlayer.y + myPlayer.size/2;
            for (let kit of medKits) {
                if (kit.active) {
                    const dist = Math.hypot(pCenterX - kit.x, pCenterY - kit.y);
                    if (dist < myPlayer.size/2 + kit.size/2) {
                        myPlayer.hp = Math.min(myPlayer.hp + 30, 100); 
                        kit.active = false;
                        conn.send({ type: 'medkit_taken', id: kit.id });
                    }
                }
            }
        }

        if (conn && conn.open) {
            conn.send({ type: 'state', x: myPlayer.x, y: myPlayer.y, hp: myPlayer.hp, name: myPlayer.name, isFlying: myPlayer.isFlying, isVisible: myPlayer.isVisible, isDead: myPlayer.isDead });
        }

        if (myHpBarTimer > 0) myHpBarTimer--;
        if (peerHpBarTimer > 0) peerHpBarTimer--;

        for (let i = myBullets.length - 1; i >= 0; i--) {
            let b = myBullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
            
            let hitWall = false;
            for (let w of walls) {
                if (b.x >= w.x && b.x <= w.x + w.width && b.y >= w.y && b.y <= w.y + w.height) { hitWall = true; break; }
            }
            if (hitWall) { myBullets.splice(i, 1); continue; }

            if (!peerPlayer.isDead && !peerPlayer.isFlying && b.x > peerPlayer.x && b.x < peerPlayer.x + peerPlayer.size && b.y > peerPlayer.y && b.y < peerPlayer.y + peerPlayer.size) {
                myBullets.splice(i, 1); continue;
            }
            if (b.life <= 0) myBullets.splice(i, 1);
        }

        for (let i = peerBullets.length - 1; i >= 0; i--) {
            let b = peerBullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
            
            let hitWall = false;
            for (let w of walls) {
                if (b.x >= w.x && b.x <= w.x + w.width && b.y >= w.y && b.y <= w.y + w.height) { hitWall = true; break; }
            }
            if (hitWall) { peerBullets.splice(i, 1); continue; }

            if (!myPlayer.isDead && !myPlayer.isFlying && b.x > myPlayer.x && b.x < myPlayer.x + myPlayer.size && b.y > myPlayer.y && b.y < myPlayer.y + myPlayer.size) {
                myPlayer.hp -= 10; 
                
                myHpBarTimer = (!myPlayer.isVisible) ? 60 : 120;
                conn.send({ type: 'hit_happen', inBush: !myPlayer.isVisible });

                if (myPlayer.hp <= 0 && !myPlayer.isDead) {
                    myPlayer.hp = 0; myPlayer.isDead = true;
                    conn.send({ type: 'game_over_signal', loser: myPlayer.name, winner: peerPlayer.name });
                    if (!resultShown) endGame(false);
                }
                peerBullets.splice(i, 1); continue;
            }
            if (b.life <= 0) peerBullets.splice(i, 1);
        }

        myHpEl.innerText = `YOUR HP: ${myPlayer.hp} ${myPlayer.isDead ? '☠️' : ''}`;
        myAmmoEl.innerText = myPlayer.isReloading ? `🔄 RELOADING...` : `AMMO: ${myPlayer.ammo}/${myPlayer.maxAmmo} [Rでリロード]`;
        peerHpEl.innerText = `${peerPlayer.name} HP: ${peerPlayer.hp} ${peerPlayer.isDead ? '☠️' : ''}`;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const myCenterX = myPlayer.x + myPlayer.size / 2;
        const myCenterY = myPlayer.y + myPlayer.size / 2;

        bushes.forEach(b => {
            const bCenterX = b.x + b.width / 2;
            const bCenterY = b.y + b.height / 2;
            const distToBush = Math.hypot(myCenterX - bCenterX, myCenterY - bCenterY);

            if (!myPlayer.isVisible && distToBush < 90) {
                ctx.fillStyle = 'rgba(35, 110, 26, 0.45)'; 
            } else {
                ctx.fillStyle = 'rgba(19, 64, 14, 0.85)';  
            }
            ctx.fillRect(b.x, b.y, b.width, b.height);
        });

        ctx.fillStyle = '#666';
        walls.forEach(w => ctx.fillRect(w.x, w.y, w.width, w.height));

        medKits.forEach(kit => {
            if (kit.active) {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(kit.x - kit.size/2, kit.y - kit.size/2, kit.size, kit.size);
                ctx.fillStyle = '#ff0000'; ctx.fillRect(kit.x - 2, kit.y - kit.size/2 + 2, 4, kit.size - 4);
                ctx.fillRect(kit.x - kit.size/2 + 2, kit.y - 2, kit.size - 4, 4);
            }
        });

        if (!myPlayer.isFlying) {
            ctx.globalAlpha = myPlayer.isVisible ? 1.0 : 0.4;
            ctx.fillStyle = myPlayer.isDead ? '#555' : myPlayer.color;
            ctx.beginPath(); ctx.arc(myPlayer.x + myPlayer.size/2, myPlayer.y + myPlayer.size/2, myPlayer.size/2, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.fillText(myPlayer.name, myPlayer.x - 5, myPlayer.y - 5);

            if (myHpBarTimer > 0 && !myPlayer.isDead) {
                ctx.fillStyle = '#333'; ctx.fillRect(myPlayer.x - 4, myPlayer.y - 14, 30, 4);
                ctx.fillStyle = '#00ff00'; ctx.fillRect(myPlayer.x - 4, myPlayer.y - 14, 30 * (myPlayer.hp / 100), 4);
            }
        }

        if (!peerPlayer.isDead && !peerPlayer.isFlying) {
            const peerCenterX = peerPlayer.x + peerPlayer.size / 2;
            const peerCenterY = peerPlayer.y + peerPlayer.size / 2;
            const distToPeer = Math.hypot(myCenterX - peerCenterX, myCenterY - peerCenterY);

            let canSeePeer = peerPlayer.isVisible || (peerHpBarTimer > 0) || (!myPlayer.isVisible && distToPeer < 90);

            if (canSeePeer) {
                ctx.globalAlpha = peerPlayer.isVisible ? 1.0 : 0.6;
                ctx.fillStyle = peerPlayer.color;
                ctx.beginPath(); ctx.arc(peerPlayer.x + peerPlayer.size/2, peerPlayer.y + peerPlayer.size/2, peerPlayer.size/2, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = '#fff'; ctx.fillText(peerPlayer.name, peerPlayer.x - 5, peerPlayer.y - 5);

                if (peerHpBarTimer > 0) {
                    ctx.fillStyle = '#333'; ctx.fillRect(peerPlayer.x - 4, peerPlayer.y - 14, 30, 4);
                    ctx.fillStyle = '#ff3333'; ctx.fillRect(peerPlayer.x - 4, peerPlayer.y - 14, 30 * (peerPlayer.hp / 100), 4);
                }
            }
        }

        if (dropShip.isActive) {
            ctx.fillStyle = '#888'; ctx.fillRect(dropShip.x - 25, dropShip.y - 10, 50, 20);
            ctx.fillStyle = '#ffcc00'; ctx.fillRect(dropShip.x - 5, dropShip.y - 15, 10, 5);
            if (myPlayer.isFlying) { ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif'; ctx.fillText('🚀 SPACEまたはEキーで降下！', dropShip.x - 60, dropShip.y + 30); }
        }

        ctx.fillStyle = '#ffff00'; myBullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));
        ctx.fillStyle = '#ff00ff'; peerBullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));

        // 【新規】視野制限（暗闇エフェクト）の描画ロジック
        // 降下中（飛行中）はマップ全体が見え、降りると自分の周り200px以外が隠れます
        if (!myPlayer.isFlying) {
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';
            let grad = ctx.createRadialGradient(myCenterX, myCenterY, 80, myCenterX, myCenterY, 200);
            grad.addColorStop(0, 'rgba(0, 0, 0, 1.0)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0.0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(myCenterX, myCenterY, 200, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        window.requestAnimationFrame(gameLoop);
    }
</script>
