<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eeetube</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --accent-color: #ff0000;
            --card-bg: #1f1f1f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }

        h1 {
            color: var(--accent-color);
            margin: 0;
            cursor: pointer;
            font-size: 28px;
            letter-spacing: -1px;
        }

        .search-box {
            display: flex;
            flex-grow: 0.5;
        }

        input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #333;
            border-radius: 20px 0 0 20px;
            background-color: #222;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #444;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* プレイヤーエリア */
        .player-section {
            display: none;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        #video-title {
            margin-top: 15px;
            font-size: 20px;
            font-weight: 600;
        }

        /* 動画グリッド */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-card:hover {
            transform: scale(1.02);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        .video-info {
            padding: 12px;
        }

        .video-card-title {
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 8px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .channel-title {
            font-size: 12px;
            color: #aaa;
        }

        .status-msg {
            text-align: center;
            color: #aaa;
            grid-column: 1 / -1;
            padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">eeetube</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="動画を検索...">
            <button onclick="searchVideos()">検索</button>
        </div>
    </header>

    <main class="container">
        <section class="player-section" id="player-section">
            <div class="video-container">
                <iframe id="youtube-player" src="" allowfullscreen></iframe>
            </div>
            <h2 id="video-title">動画タイトル</h2>
        </section>

        <section class="video-grid" id="video-grid">
            <div class="status-msg" id="status-text">APIキーを設定してください。</div>
        </section>
    </main>

    <script>
        // 🔑 【重要】ここに取得したGoogleのAPIキーを貼り付けてください！
        const API_KEY = 'YOUR_YOUTUBE_API_KEY_HERE';

        window.onload = () => {
            if (API_KEY === 'YOUR_YOUTUBE_API_KEY_HERE' || API_KEY === '') {
                showStatus('⚠️ 失敗: コード内の「YOUR_YOUTUBE_API_KEY_HERE」を取得したAPIキーに書き換えてください。');
                return;
            }
            fetchTrendingVideos();
        };

        // YouTube公式APIから日本のトレンド（人気）動画を取得
        async function fetchTrendingVideos() {
            showStatus('日本の急上昇を読み込み中...');
            const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=JP&maxResults=24&key=${API_KEY}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.error) {
                    showStatus(`APIエラー: ${data.error.message}`);
                    return;
                }
                displayVideos(data.items);
            } catch (error) {
                console.error(error);
                showStatus('データの取得に失敗しました。APIキーの設定を確認してください。');
            }
        }

        // YouTube公式APIから検索結果を取得
        async function searchVideos() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            showStatus(`「${query}」の検索結果を読み込み中...`);
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=24&key=${API_KEY}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.error) {
                    showStatus(`APIエラー: ${data.error.message}`);
                    return;
                }
                if(data.items.length === 0) {
                    showStatus('該当する動画が見つかりませんでした。');
                } else {
                    displayVideos(data.items);
                }
            } catch (error) {
                console.error(error);
                showStatus('検索中にエラーが発生しました。');
            }
        }

        // 画面に動画リストを描画
        function displayVideos(items) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            items.forEach(item => {
                // search APIとvideos APIでIDの構造が異なるのを補正
                const videoId = item.id.videoId || item.id;
                const snippet = item.snippet;
                if (!videoId) return;

                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(videoId, snippet.title);

                card.innerHTML = `
                    <img class="thumbnail" src="${snippet.thumbnails.medium.url}" loading="lazy" alt="${snippet.title}">
                    <div class="video-info">
                        <p class="video-card-title">${snippet.title}</p>
                        <p class="channel-title">${snippet.channelTitle}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 動画再生
        function playVideo(videoId, title) {
            const playerSection = document.getElementById('player-section');
            const player = document.getElementById('youtube-player');
            const titleElement = document.getElementById('video-title');

            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            titleElement.innerHTML = title; // 公式APIはエスケープ文字を含むことがあるためinnerHTML
            playerSection.style.display = 'block';

            playerSection.scrollIntoView({ behavior: 'smooth' });
        }

        function showStatus(msg) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = `<div class="status-msg">${msg}</div>`;
        }

        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchVideos();
            }
        });
    </script>
</body>
</html>
