<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">英語学習ポータル - English Study Room</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --accent-color: #ff0000;
            --sidebar-bg: #161616;
            --card-bg: #1f1f1f;
            --active-bg: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5; /* 最初は明るい学習サイト風 */
            color: #333333;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* --- モード共通設定 --- */
        .hidden { display: none !important; }

        /* --- 【表の顔】学習サイト用スタイル --- */
        #dummy-study-site {
            width: 100vw;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-y: auto;
            text-align: center;
        }
        .study-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .word-card {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
            padding: 20px;
            background: #ecf0f1;
            border-radius: 6px;
        }
        .gate-input-wrapper {
            margin-top: 40px;
            border-top: 1px dashed #ccc;
            padding-top: 20px;
        }
        .gate-input {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 60%;
            text-align: center;
        }

        /* --- 【裏の顔】eeetube用スタイル（パスワード解除後） --- */
        body.dark-mode {
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        
        aside {
            width: 240px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
            flex-shrink: 0;
        }
        .logo-area {
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* YouTube風のカスタムアイコン */
        .yt-icon {
            width: 32px;
            height: 22px;
            background-color: var(--accent-color);
            border-radius: 6px;
            position: relative;
            display: inline-block;
        }
        .yt-icon::after {
            content: '';
            position: absolute;
            border-left: 8px solid white;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            top: 6px;
            left: 13px;
        }
        .logo-area h1 {
            color: #fff;
            margin: 0;
            cursor: pointer;
            font-size: 22px;
            letter-spacing: -1px;
            font-weight: bold;
        }
        .logo-area span { color: var(--accent-color); }

        .menu-list { list-style: none; padding: 10px 0; margin: 0; }
        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 600;
            transition: background 0.2s;
            color: #aaa;
        }
        .menu-item:hover { background-color: #222; color: #fff; }
        .menu-item.active {
            background-color: var(--active-bg);
            color: #fff;
            border-left: 4px solid var(--accent-color);
            padding-left: 16px;
        }

        main { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .input-wrapper { max-width: 800px; width: 100%; margin: 0 auto; display: flex; }
        main input {
            width: 100%; padding: 12px 20px; border: 1px solid #333;
            border-radius: 24px 0 0 24px; background-color: #222; color: #fff; font-size: 16px; outline: none;
        }
        main button {
            padding: 12px 28px; border: none; background-color: var(--accent-color); color: white;
            border-radius: 0 24px 24px 0; cursor: pointer; font-size: 16px; font-weight: bold; flex-shrink: 0;
        }

        .player-section { display: none; background-color: var(--card-bg); padding: 15px; border-radius: 12px; max-width: 900px; width: 100%; margin: 0 auto; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        #video-title { margin-top: 15px; font-size: 18px; font-weight: 600; color: #fff; }

        .content-panel { display: none; max-width: 1200px; width: 100%; margin: 0 auto; }
        .content-panel.active { display: block; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .video-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: scale(1.02); }
        .thumbnail { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }
        .video-info { padding: 12px; color: #fff; }
        .video-card-title { font-size: 13px; font-weight: bold; margin: 0 0 6px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .channel-title { font-size: 11px; color: #aaa; }
        .direct-info-box { background-color: var(--card-bg); padding: 40px 20px; border-radius: 12px; text-align: center; color: #aaa; max-width: 600px; margin: 40px auto 0 auto; }
        .status-msg { text-align: center; color: #aaa; padding: 40px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="dummy-study-site">
        <div class="study-container">
            <h2>毎日英単語トレーニング</h2>
            <p>本日の重要ワード</p>
            <div class="word-card">
                persistence <br>
                <span style="font-size: 16px; color:#7f8c8d; font-weight: normal;">【名】粘り強さ、不屈の努力</span>
            </div>
            <p style="color: #7f8c8d; font-size: 14px;">例文：Success requires persistence.</p>

            <div class="gate-input-wrapper">
                <p style="font-size: 12px; color: #ccc;">管理者用認証コード</p>
                <input type="password" class="gate-input" id="gate-pass" placeholder="Enter password..." oninput="checkPassword()">
            </div>
        </div>
    </div>

    <aside id="true-sidebar" class="hidden">
        <div class="logo-area">
            <div class="yt-icon"></div>
            <h1>eee<span>TUBE</span></h1>
        </div>
        <ul class="menu-list">
            <li class="menu-item active" id="menu-trend" onclick="switchMode('trend')">🔥 急上昇トレンド</li>
            <li class="menu-item" id="menu-search" onclick="switchMode('search')">🔍 動画検索</li>
            <li class="menu-item" id="menu-direct" onclick="switchMode('direct')">🔗 URL直打ち再生</li>
        </ul>
    </aside>

    <main id="true-main" class="hidden">
        <section class="player-section" id="player-section">
            <div class="video-container">
                <iframe id="youtube-player" src="" allowfullscreen></iframe>
            </div>
            <h2 id="video-title">動画再生中</h2>
        </section>

        <div class="content-panel active" id="panel-trend">
            <div class="video-grid" id="trend-grid">
                <div class="status-msg">読み込み中...</div>
            </div>
        </div>

        <div class="content-panel" id="panel-search">
            <div class="input-wrapper">
                <input type="text" id="search-input" placeholder="検索キーワードを入力...">
                <button onclick="searchVideos()">検索</button>
            </div>
            <div class="video-grid" id="search-grid" style="margin-top: 20px;">
                <div class="status-msg">キーワードを入力して検索してください。</div>
            </div>
        </div>

        <div class="content-panel" id="panel-direct">
            <div class="input-wrapper">
                <input type="text" id="direct-input" placeholder="YouTube動画のURL または 動画ID を貼り付け...">
                <button onclick="loadDirectVideo()">再生</button>
            </div>
            <div class="direct-info-box">
                <h3>URL直接入力モード</h3>
                <p>YouTubeの動画URLやShortsのURLをそのまま貼り付ければ、APIを介さず100%確実に再生できます。</p>
            </div>
        </div>
    </main>

    <link id="dynamic-favicon" rel="icon" type="image/x-icon" href="">

    <script>
        // 🔒 パスワードチェック関数
        function checkPassword() {
            const pass = document.getElementById('gate-pass').value;
            if (pass === 'eeeisgod') {
                activateEeeTube();
            }
        }

        // 💥 裏モード「eeetube」を起動する関数
        function activateEeeTube() {
            // ダミーサイトを消去
            document.getElementById('dummy-study-site').style.display = 'none';
            
            // 裏コンテンツを表示
            document.getElementById('true-sidebar').classList.remove('hidden');
            document.getElementById('true-main').classList.remove('hidden');
            document.body.classList.add('dark-mode');
            
            // タイトルとアイコン（YouTube風）を書き換え
            document.getElementById('site-title').textContent = 'eeeTUBE';
            changeFaviconToYouTubeStyle();

            // トレンド読み込み開始
            fetchTrendingVideos();
        }

        // 赤いYouTube風ファビコン（アイコン）を即席で生成して設定
        function changeFaviconToYouTubeStyle() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff0000';
            ctx.beginPath(); ctx.roundRect(2, 6, 28, 20, 6); ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.moveTo(13, 11); ctx.lineTo(21, 16); ctx.lineTo(13, 21); ctx.fill();
            document.getElementById('dynamic-favicon').href = canvas.toDataURL();
        }

        // 🛠️ 【機能強化】3つのフリーAPIサーバーのリスト（1つ目が死んだら次に行く）
        const API_SERVERS = [
            'https://vid.puffyan.us/api/v1',
            'https://invidious.perennialte.ch/api/v1',
            'https://iv.melmac.space/api/v1'
        ];
        const CORS_PROXY = 'https://api.allorigins.win/get?url=';

        // モード切り替え
        function switchMode(mode) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.content-panel').forEach(el => el.classList.remove('active'));
            document.getElementById(`menu-${mode}`).classList.add('active');
            document.getElementById(`panel-${mode}`).classList.add('active');
        }

        // 共通関数：3つのAPIを順に試して通信する仕組み（フォールバック）
        async function fetchFromAvailableAPI(endpoint) {
            for (let i = 0; i < API_SERVERS.length; i++) {
                const targetUrl = `${API_SERVERS[i]}${endpoint}`;
                console.log(`Trying API Server ${i + 1}: ${targetUrl}`);
                try {
                    const response = await fetch(`${CORS_PROXY}${encodeURIComponent(targetUrl)}`);
                    if (!response.ok) throw new Error('Proxy error');
                    const outerData = await response.json();
                    const data = JSON.parse(outerData.contents);
                    if (data) return data; // 成功したらデータを返す
                } catch (e) {
                    console.warn(`Server ${i + 1} failed. Moving to next...`);
                }
            }
            throw new Error('All servers failed');
        }

        // 1. トレンド取得
        async function fetchTrendingVideos() {
            const grid = document.getElementById('trend-grid');
            grid.innerHTML = '<div class="status-msg">急上昇を読み込み中...(予備サーバー連動中)</div>';
            
            try {
                const data = await fetchFromAvailableAPI('/trending?region=JP');
                displayVideos(data, 'trend-grid');
            } catch (error) {
                grid.innerHTML = '<div class="status-msg">⚠️ 全てのフリーAPIサーバーが応答しません。左メニューから「URL直接入力再生」をご利用ください。</div>';
            }
        }

        // 2. 検索処理
        async function searchVideos() {
            const query = document.getElementById('search-input').value.trim();
            const grid = document.getElementById('search-grid');
            if (!query) return;

            grid.innerHTML = `<div class="status-msg">「${query}」を検索中...</div>`;
            
            try {
                const data = await fetchFromAvailableAPI(`/search?q=${encodeURIComponent(query)}&type=video`);
                if(!data || data.length === 0) {
                    grid.innerHTML = '<div class="status-msg">該当する動画が見つかりませんでした。</div>';
                } else {
                    displayVideos(data, 'search-grid');
                }
            } catch (error) {
                grid.innerHTML = '<div class="status-msg">⚠️ 検索サーバーが全滅しています。左メニューの「URL直接入力再生」を試してください。</div>';
            }
        }

        // 3. URL直打ち処理
        function loadDirectVideo() {
            const input = document.getElementById('direct-input').value.trim();
            if (!input) return;

            let videoId = input;
            if (input.includes('youtube.com') || input.includes('youtu.be')) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
                const match = input.match(regExp);
                if (match && match[2].length === 11) {
                    videoId = match[2];
                } else {
                    alert('URLから動画IDを抽出できませんでした。');
                    return;
                }
            }
            if(videoId.length !== 11) {
                alert('有効な動画IDを入力してください。');
                return;
            }
            playVideo(videoId, "直接入力動画");
        }

        // 描画
        function displayVideos(videos, targetGridId) {
            const grid = document.getElementById(targetGridId);
            grid.innerHTML = '';
            if (!Array.isArray(videos)) return;

            videos.forEach(video => {
                if (!video.videoId) return;
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(video.videoId, video.title);

                let thumbUrl = 'https://via.placeholder.com/320x180?text=No+Image';
                if (video.videoThumbnails && video.videoThumbnails.length > 0) {
                    const mediumThumb = video.videoThumbnails.find(t => t.quality === 'medium') || video.videoThumbnails[0];
                    thumbUrl = mediumThumb.url;
                }

                card.innerHTML = `
                    <img class="thumbnail" src="${thumbUrl}" loading="lazy">
                    <div class="video-info">
                        <p class="video-card-title">${video.title}</p>
                        <p class="channel-title">${video.author || 'Unknown'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 再生
        function playVideo(videoId, title) {
            const playerSection = document.getElementById('player-section');
            const player = document.getElementById('youtube-player');
            const titleElement = document.getElementById('video-title');

            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            titleElement.textContent = title;
            playerSection.style.display = 'block';
            playerSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Enterキーのイベント
        document.getElementById('search-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') searchVideos(); });
        document.getElementById('direct-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') loadDirectVideo(); });
    </script>
</body>
</html>
